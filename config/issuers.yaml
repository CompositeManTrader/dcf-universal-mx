# 35 emisoras del IPC (Indice de Precios y Cotizaciones, BMV).
# Formato: ticker -> {name, sector, market_price (placeholder), notes}
# Actualizar `market_price` con cierre del dia para corridas frescas.
# El sector debe coincidir con keys de sectors.yaml.

market_defaults:
  risk_free: 0.0921           # M-BONO 10Y nominal (calibrado vs analista WIP)
  erp: 0.0610                 # ERP MX = ERP US + CRP MX (calibrado)
  marginal_tax: 0.30
  terminal_growth: 0.03       # ~ inflacion MX largo plazo
  terminal_wacc_override: 0.0850   # Fade a costo maduro (replica analista)
  revenue_growth_high: 0.05   # Default conservador 5y
  forecast_years: 10
  high_growth_years: 5
  fx_rate_usdmxn: 19.50        # Para emisoras que reportan en USD (GMEXICO, CEMEX, ORBIA, etc)

